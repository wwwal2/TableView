services:
  db:
    image: postgres:16-alpine
    container_name: database_table_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BE
    container_name: database_table_backend
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://app:app@db:5432/appdb
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./FE
    container_name: database_table_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
